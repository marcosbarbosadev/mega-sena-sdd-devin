spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:megasena}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
    username: ${MYSQL_USER:megasena}
    password: ${MYSQL_PASSWORD:megasena}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

megasena:
  identidade:
    project-id: ${IDENTIDADE_PROJECT_ID:}
    admins-bootstrap: ${IDENTIDADE_ADMINS_BOOTSTRAP:}
  source:
    base-url: ${MEGASENA_SOURCE_URL:https://servicebus2.caixa.gov.br/portaldeloterias/api/megasena}
    connect-timeout: ${MEGASENA_CONNECT_TIMEOUT:5000}
    read-timeout: ${MEGASENA_READ_TIMEOUT:10000}
    user-agent: "MegaSenaSync/1.0"
  sync:
    cron: ${MEGASENA_SYNC_CRON:0 0 22 * * *}
    retry-max-attempts: ${MEGASENA_RETRY_MAX:3}
    retry-wait-duration: ${MEGASENA_RETRY_WAIT:2s}
  admin:
    token: ${MEGASENA_ADMIN_TOKEN:changeme}

logging:
  level:
    com.megasena.sync: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

resilience4j:
  retry:
    instances:
      caixaApi:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
