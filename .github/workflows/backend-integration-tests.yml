name: Backend Integration Tests

# Roda a suíte COMPLETA do backend via `verify`: unitários (Surefire, *Test.java)
# + integração (Failsafe, *IT.java) com Testcontainers (MySQL) e WireMock.
# Os runners ubuntu-latest já trazem Docker; o Testcontainers detecta e sobe os
# containers sozinho — não é necessário um service container de MySQL.
#
# Por ser mais pesado que o job de unidade, roda em pull_request e em push na main
# (não em todo push de branch de feature).

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-integration-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-integration-tests.yml'

permissions:
  contents: read

jobs:
  integration-tests:
    name: Maven verify (Failsafe + Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run full test suite (unit + integration)
        # `verify` aciona o Failsafe (*IT.java) com Testcontainers; o Docker do
        # runner é usado automaticamente pelo Testcontainers.
        run: ./mvnw -B -ntp verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          # Relativo à raiz do repo (GITHUB_WORKSPACE); upload-artifact não usa o
          # working-directory dos steps `run`.
          path: |
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
          if-no-files-found: ignore
